name: Build and Deploy to Docker Hub

on: [push, pull_request]

jobs:
  test:
    name: Test valid HTML
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main

    - name: Test Result
      run: nix flake check
